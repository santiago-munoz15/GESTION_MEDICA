services:
  - type: web
    name: agente-medico-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn agente_medico.wsgi"
    plan: free
    autoDeploy: true

  - type: web
    name: agente-medico-frontend
    env: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: dist
    plan: free
    autoDeploy: true