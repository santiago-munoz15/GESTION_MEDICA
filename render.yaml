services:
  - type: web
    name: GESTION_MEDICA
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn agente_medico.wsgi"
    plan: free
    autoDeploy: true
    envVars:
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://gestion-medica-1.onrender.com"

  - type: web
    name: GESTION_MEDICA-1
    env: static
    buildCommand: "cd frontend && npm ci && npm run build"
    staticPublishPath: frontend/dist
    plan: free
    autoDeploy: true
    envVars:
      - key: VITE_API_BASE_URL
        value: "https://gestion-medica.onrender.com"